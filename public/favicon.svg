<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Smooth gray background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </linearGradient>

    <!-- Clean white gradient -->
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="32">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>

    <!-- Very soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.8" stdDeviation="0.6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="1" y="1" width="30" height="30" rx="7"
        fill="none"
        stroke="#ffffff"
        stroke-opacity="0.08"/>

  <!-- Left bracket -->
  <path d="M11 9 L7 16 L11 23"
        stroke="url(#fg)"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#softShadow)"/>

  <!-- Right bracket -->
  <path d="M21 9 L25 16 L21 23"
        stroke="url(#fg)"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#softShadow)"/>

  <!-- Center bolt -->
  <path d="M18 10 L14 17 H17 L14 22 L20 14 H17 Z"
        fill="url(#fg)"
        filter="url(#softShadow)"/>

  <!-- Top soft light -->
  <rect x="0" y="0" width="32" height="10"
        fill="#ffffff"
        opacity="0.06"/>
</svg>