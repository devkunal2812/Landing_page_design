<svg width="390" height="900" viewBox="0 0 390 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Full Page Layout — Mobile 390px</title>

  <defs>
    <pattern id="mgrid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M 52 0 L 0 0 0 52" fill="none" stroke="#000000" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <linearGradient id="mhl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="390" height="900" fill="#F0F0F0"/>
  <rect width="390" height="900" fill="url(#mgrid)"/>

  <!-- Ambient orb -->
  <circle cx="300" cy="200" r="200" fill="#B4B4B4" fill-opacity="0.12" filter="blur(60px)"/>
  <circle cx="100" cy="600" r="160" fill="#3b82f6" fill-opacity="0.05" filter="blur(60px)"/>

  <!-- ── NAVBAR ── -->
  <rect width="390" height="64" fill="#F0F0F0" fill-opacity="0.97"/>
  <rect width="390" height="1" y="63" fill="#000000" fill-opacity="0.08"/>
  <circle cx="20" cy="32" r="4" fill="#333333"/>
  <text x="32" y="37" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#111111">Kunal.dev</text>
  <!-- Hamburger -->
  <rect x="350" y="26" width="22" height="1.5" rx="1" fill="#111111"/>
  <rect x="350" y="31" width="22" height="1.5" rx="1" fill="#111111"/>
  <rect x="350" y="36" width="22" height="1.5" rx="1" fill="#111111"/>

  <!-- ── HERO TEXT (centered) ── -->
  <!-- Badge -->
  <rect x="71" y="96" width="248" height="26" rx="13" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="87" cy="109" r="3" fill="#555555"/>
  <text x="97" y="113" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#555555" letter-spacing="0.8">FULL-STACK ENGINEER</text>

  <!-- Headline -->
  <text x="195" y="162" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#111111" letter-spacing="-1.5" text-anchor="middle">Where Design</text>
  <text x="195" y="198" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#111111" letter-spacing="-1.5" text-anchor="middle">Meets</text>
  <!-- Gradient word -->
  <rect x="80" y="204" width="230" height="40" fill="url(#mhl)" opacity="0.85" rx="2"/>
  <text x="195" y="234" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="transparent" letter-spacing="-1.5" text-anchor="middle">Intelligent</text>
  <text x="195" y="270" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#111111" letter-spacing="-1.5" text-anchor="middle">Engineering</text>

  <!-- Subtext -->
  <text x="195" y="306" font-family="Inter, sans-serif" font-size="13.5" fill="#555555" text-anchor="middle">I craft high-performance web apps</text>
  <text x="195" y="324" font-family="Inter, sans-serif" font-size="13.5" fill="#555555" text-anchor="middle">blending design precision with</text>
  <text x="195" y="342" font-family="Inter, sans-serif" font-size="13.5" fill="#555555" text-anchor="middle">modern engineering.</text>

  <!-- Chips (centered, wrapping) -->
  <g transform="translate(195, 362)" text-anchor="middle">
    <rect x="-155" width="52" height="22" rx="11" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.09" stroke-width="1"/>
    <text x="-129" y="15" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555" text-anchor="middle">React</text>
    <rect x="-95" width="58" height="22" rx="11" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.09" stroke-width="1"/>
    <text x="-66" y="15" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555" text-anchor="middle">Next.js</text>
    <rect x="-29" width="76" height="22" rx="11" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.09" stroke-width="1"/>
    <text x="9" y="15" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555" text-anchor="middle">TypeScript</text>
    <rect x="55" width="60" height="22" rx="11" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.09" stroke-width="1"/>
    <text x="85" y="15" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555" text-anchor="middle">Node.js</text>
    <!-- Row 2 -->
    <rect x="-80" y="30" width="50" height="22" rx="11" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.09" stroke-width="1"/>
    <text x="-55" y="45" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555" text-anchor="middle">Figma</text>
    <rect x="-20" y="30" width="60" height="22" rx="11" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.09" stroke-width="1"/>
    <text x="10" y="45" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555" text-anchor="middle">AI Tools</text>
  </g>

  <!-- Stats -->
  <g transform="translate(195, 448)" text-anchor="middle">
    <text x="-90" y="24" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#111111" letter-spacing="-1" text-anchor="middle">3+</text>
    <text x="-90" y="38" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#999999" text-anchor="middle">Years Exp.</text>
    <text x="0" y="24" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#111111" letter-spacing="-1" text-anchor="middle">20+</text>
    <text x="0" y="38" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#999999" text-anchor="middle">Projects</text>
    <text x="90" y="24" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#111111" letter-spacing="-1" text-anchor="middle">10+</text>
    <text x="90" y="38" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#999999" text-anchor="middle">Clients</text>
  </g>

  <!-- ── SYSTEM CORE (scaled down, centered) ── -->
  <!-- Rings -->
  <circle cx="195" cy="660" r="90" stroke="#000000" stroke-opacity="0.06" stroke-width="1" fill="none"/>
  <circle cx="195" cy="660" r="76" stroke="#3b82f6" stroke-opacity="0.18" stroke-width="1" stroke-dasharray="4 3" fill="none"/>
  <circle cx="195" cy="660" r="62" stroke="#000000" stroke-opacity="0.12" stroke-width="1" fill="none"/>

  <!-- Glow -->
  <circle cx="195" cy="660" r="90" fill="#C8C8C8" fill-opacity="0.15"/>

  <!-- Profile -->
  <circle cx="195" cy="660" r="52" fill="#CCCCCC"/>
  <circle cx="195" cy="660" r="52" stroke="white" stroke-width="2.5" fill="none"/>
  <circle cx="195" cy="660" r="56" stroke="#000000" stroke-opacity="0.08" stroke-width="4" fill="none"/>
  <circle cx="195" cy="644" r="16" fill="#AAAAAA"/>
  <ellipse cx="195" cy="686" rx="26" ry="18" fill="#AAAAAA"/>
  <text x="195" y="664" font-family="Inter, sans-serif" font-size="9" fill="#666666" text-anchor="middle">Photo</text>

  <!-- Core label -->
  <rect x="169" y="716" width="52" height="16" rx="8" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.1" stroke-width="1"/>
  <text x="195" y="728" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="#555555" text-anchor="middle" letter-spacing="1.5">KUNAL</text>

  <!-- Mini skill cards (2 visible on mobile) -->
  <rect x="10" y="610" width="130" height="48" rx="10" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="20" y="622" width="24" height="24" rx="6" fill="#000000" fill-opacity="0.08"/>
  <text x="50" y="633" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#111111">Frontend</text>
  <text x="50" y="646" font-family="Inter, sans-serif" font-size="8" fill="#999999">React · Next.js</text>

  <rect x="250" y="610" width="130" height="48" rx="10" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="260" y="622" width="24" height="24" rx="6" fill="rgba(59,130,246,0.1)"/>
  <text x="290" y="633" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#111111">AI Tools</text>
  <text x="290" y="646" font-family="Inter, sans-serif" font-size="8" fill="#999999">LLMs · Agents</text>

  <!-- Connection lines (simplified) -->
  <path d="M 75 634 C 120 648, 160 656, 195 660" stroke="#888888" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="4 4" fill="none"/>
  <path d="M 315 634 C 270 648, 230 656, 195 660" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="4 4" fill="none"/>

  <!-- Annotations -->
  <rect x="0" y="0" width="200" height="18" fill="#111111"/>
  <text x="8" y="12" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ffffff" letter-spacing="0.08em">FULL PAGE — MOBILE 390px</text>

  <line x1="380" y1="64" x2="380" y2="500" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="364" y="284" font-family="Inter, sans-serif" font-size="8" fill="#3b82f6" transform="rotate(-90 364 284)">hero text section</text>

  <line x1="380" y1="500" x2="380" y2="900" stroke="#6366f1" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="364" y="700" font-family="Inter, sans-serif" font-size="8" fill="#6366f1" transform="rotate(-90 364 700)">system core section</text>

  <!-- Padding annotation -->
  <line x1="0" y1="890" x2="20" y2="890" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="2" y="886" font-family="Inter, sans-serif" font-size="8" fill="#f59e0b">20px</text>
</svg>
