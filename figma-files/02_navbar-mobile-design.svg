<svg width="390" height="420" viewBox="0 0 390 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Navbar Mobile + Drawer Design</title>

  <!-- Nav bar -->
  <rect width="390" height="64" fill="#F0F0F0" fill-opacity="0.97"/>
  <rect width="390" height="1" y="63" fill="#000000" fill-opacity="0.08"/>

  <!-- Logo -->
  <circle cx="20" cy="32" r="4" fill="#333333"/>
  <text x="32" y="37" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#111111">Kunal.dev</text>

  <!-- Hamburger open state -->
  <g transform="translate(346, 20)">
    <rect y="0"  width="22" height="1.5" rx="1" fill="#111111" transform="rotate(45 11 11)"/>
    <rect y="10" width="22" height="1.5" rx="1" fill="#111111" opacity="0"/>
    <rect y="20" width="22" height="1.5" rx="1" fill="#111111" transform="rotate(-45 11 11)"/>
  </g>

  <!-- Drawer background -->
  <rect y="64" width="390" height="356" fill="#F0F0F0" fill-opacity="0.97"/>
  <rect y="64" width="390" height="1" fill="#000000" fill-opacity="0.08"/>

  <!-- Drawer links -->
  <text x="28" y="116" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#111111">About</text>
  <rect x="28" y="122" width="334" height="1" fill="#000000" fill-opacity="0.08"/>

  <text x="28" y="162" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#111111">Projects</text>
  <rect x="28" y="168" width="334" height="1" fill="#000000" fill-opacity="0.08"/>

  <text x="28" y="208" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#111111">Skills</text>
  <rect x="28" y="214" width="334" height="1" fill="#000000" fill-opacity="0.08"/>

  <text x="28" y="254" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#111111">Contact</text>
  <rect x="28" y="260" width="334" height="1" fill="#000000" fill-opacity="0.08"/>

  <!-- Status in drawer -->
  <circle cx="36" cy="296" r="4" fill="#22c55e"/>
  <circle cx="36" cy="296" r="7" fill="#22c55e" fill-opacity="0.2"/>
  <text x="48" y="300" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#555555">Available for work</text>

  <!-- Backdrop hint -->
  <rect y="420" width="390" height="40" fill="#000000" fill-opacity="0.15"/>

  <!-- Annotations -->
  <rect x="0" y="0" width="180" height="18" fill="#111111"/>
  <text x="8" y="12" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ffffff" letter-spacing="0.08em">NAVBAR — MOBILE DRAWER</text>

  <line x1="380" y1="64" x2="380" y2="420" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text x="364" y="244" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6" transform="rotate(-90 364 244)">356px drawer</text>
</svg>
