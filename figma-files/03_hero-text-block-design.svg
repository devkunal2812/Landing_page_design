<svg width="560" height="520" viewBox="0 0 560 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Hero Text Block Design</title>

  <!-- Background -->
  <rect width="560" height="520" fill="#F8F8F8" rx="16"/>
  <rect width="560" height="520" rx="16" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Badge -->
  <rect x="32" y="36" width="268" height="28" rx="14" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="50" cy="50" r="3" fill="#555555"/>
  <circle cx="50" cy="50" r="5" fill="#555555" fill-opacity="0.2"/>
  <text x="62" y="54" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555" letter-spacing="1.2">FULL-STACK ENGINEER &amp; DESIGNER</text>

  <!-- Headline line 1 -->
  <text x="32" y="122" font-family="Inter, sans-serif" font-size="52" font-weight="900" fill="#111111" letter-spacing="-2.5">Where Design</text>

  <!-- Headline line 2 — "Meets" plain + "Intelligent" gradient -->
  <text x="32" y="178" font-family="Inter, sans-serif" font-size="52" font-weight="900" fill="#111111" letter-spacing="-2.5">Meets </text>
  <text x="32" y="178" font-family="Inter, sans-serif" font-size="52" font-weight="900" letter-spacing="-2.5">
    <tspan dx="148">Intelligent</tspan>
  </text>
  <!-- Gradient overlay for "Intelligent" word -->
  <rect x="180" y="132" width="310" height="56" fill="url(#headline-grad)" rx="2"/>

  <!-- Headline line 3 -->
  <text x="32" y="234" font-family="Inter, sans-serif" font-size="52" font-weight="900" fill="#111111" letter-spacing="-2.5">Engineering</text>

  <!-- Subtext -->
  <text x="32" y="278" font-family="Inter, sans-serif" font-size="15" font-weight="400" fill="#555555">
    <tspan x="32" dy="0">I craft high-performance web apps blending design</tspan>
    <tspan x="32" dy="22">precision with modern engineering — from pixel-perfect</tspan>
    <tspan x="32" dy="22">UI to scalable backend systems.</tspan>
  </text>

  <!-- Tech chips -->
  <g transform="translate(32, 348)">
    <!-- React chip -->
    <rect width="54" height="24" rx="12" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.09" stroke-width="1"/>
    <text x="10" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555">React</text>
    <!-- Next.js chip -->
    <rect x="62" width="60" height="24" rx="12" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.09" stroke-width="1"/>
    <text x="72" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555">Next.js</text>
    <!-- TypeScript chip -->
    <rect x="130" width="80" height="24" rx="12" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.09" stroke-width="1"/>
    <text x="140" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555">TypeScript</text>
    <!-- Node.js chip -->
    <rect x="218" width="62" height="24" rx="12" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.09" stroke-width="1"/>
    <text x="228" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555">Node.js</text>
    <!-- Figma chip -->
    <rect x="288" width="52" height="24" rx="12" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.09" stroke-width="1"/>
    <text x="298" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555">Figma</text>
    <!-- AI Tools chip -->
    <rect x="348" width="62" height="24" rx="12" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.09" stroke-width="1"/>
    <text x="358" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555">AI Tools</text>
  </g>

  <!-- Stats row -->
  <g transform="translate(32, 408)">
    <!-- Stat 1 -->
    <text x="0" y="32" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#111111" letter-spacing="-1.2">3+</text>
    <text x="0" y="50" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#999999">Years Experience</text>
    <!-- Divider -->
    <rect x="90" y="8" width="1" height="48" fill="#000000" fill-opacity="0.08"/>
    <!-- Stat 2 -->
    <text x="104" y="32" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#111111" letter-spacing="-1.2">20+</text>
    <text x="104" y="50" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#999999">Projects Shipped</text>
    <!-- Divider -->
    <rect x="210" y="8" width="1" height="48" fill="#000000" fill-opacity="0.08"/>
    <!-- Stat 3 -->
    <text x="224" y="32" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#111111" letter-spacing="-1.2">10+</text>
    <text x="224" y="50" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#999999">Happy Clients</text>
  </g>

  <!-- Component label -->
  <rect x="0" y="0" width="170" height="18" rx="0" fill="#111111"/>
  <text x="8" y="12" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ffffff" letter-spacing="0.08em">HERO TEXT BLOCK</text>

  <!-- Spacing annotations -->
  <line x1="540" y1="36" x2="540" y2="64" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="544" y="54" font-family="Inter, sans-serif" font-size="8" fill="#f59e0b">28px</text>
  <line x1="540" y1="64" x2="540" y2="96" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="544" y="84" font-family="Inter, sans-serif" font-size="8" fill="#f59e0b">28px</text>

  <defs>
    <linearGradient id="headline-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111111" stop-opacity="0"/>
      <stop offset="30%" stop-color="#3b82f6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
</svg>
