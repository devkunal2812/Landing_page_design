  <circle cx="52" cy="32" r="4" fill="#333333"/>
  <text x="64" y="37" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#111111">Kunal.dev</text>
  <text x="580" y="37" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#555555">About</text>
  <text x="648" y="37" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#555555">Projects</text>
  <text x="736" y="37" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#555555">Skills</text>
  <text x="804" y="37" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#555555">Contact</text>
