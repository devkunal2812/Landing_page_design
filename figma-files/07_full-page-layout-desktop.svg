  <text x="672" y="478" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#111111">Backend Systems</text>
  <text x="672" y="492" font-family="Inter, sans-serif" font-size="9" fill="#999999">Node.js · APIs</text>

  <rect x="1156" y="452" width="160" height="56" rx="12" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="1168" y="464" width="28" height="28" rx="7" fill="rgba(59,130,246,0.1)"/>
  <text x="1204" y="478" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#111111">AI Integration</text>
  <text x="1204" y="492" font-family="Inter, sans-serif" font-size="9" fill="#999999">LLMs · Agents</text>

  <rect x="680" y="676" width="160" height="56" rx="12" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="692" y="688" width="28" height="28" rx="7" fill="rgba(100,100,100,0.08)"/>
  <text x="728" y="702" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#111111">Performance</text>
  <text x="728" y="716" font-family="Inter, sans-serif" font-size="9" fill="#999999">Core Web Vitals</text>

  <rect x="1100" y="676" width="160" height="56" rx="12" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="1112" y="688" width="28" height="28" rx="7" fill="rgba(99,102,241,0.09)"/>
  <text x="1148" y="702" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#111111">Sys. Architecture</text>
  <text x="1148" y="716" font-family="Inter, sans-serif" font-size="9" fill="#999999">Cloud · DevOps</text>

  <!-- Grid column divider -->
  <line x1="720" y1="64" x2="720" y2="900" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Annotations -->
  <rect x="0" y="0" width="200" height="18" fill="#111111"/>
  <text x="8" y="12" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ffffff" letter-spacing="0.08em">FULL PAGE — DESKTOP 1440</text>

  <text x="64" y="880" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">← 64px padding</text>
  <text x="1360" y="880" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">64px →</text>
  <line x1="64" y1="870" x2="64" y2="900" stroke="#3b82f6" stroke-width="0.5"/>
  <line x1="1376" y1="870" x2="1376" y2="900" stroke="#3b82f6" stroke-width="0.5"/>
