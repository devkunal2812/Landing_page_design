<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Full Page Layout — Desktop 1440px</title>

  <!-- Page background -->
  <rect width="1440" height="900" fill="#F0F0F0"/>

  <!-- Background grid -->
  <defs>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M 52 0 L 0 0 0 52" fill="none" stroke="#000000" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <radialGradient id="orb1" cx="70%" cy="10%" r="40%">
      <stop offset="0%" stop-color="#B4B4B4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="orb2" cx="60%" cy="90%" r="30%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="orb3" cx="10%" cy="55%" r="22%">
      <stop offset="0%" stop-color="#969696" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="hl-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="900" fill="url(#grid)"/>
  <rect width="1440" height="900" fill="url(#orb1)"/>
  <rect width="1440" height="900" fill="url(#orb2)"/>
  <rect width="1440" height="900" fill="url(#orb3)"/>

