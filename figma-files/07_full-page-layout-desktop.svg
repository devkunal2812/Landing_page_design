  <rect x="64" y="128" width="248" height="26" rx="13" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="80" cy="141" r="3" fill="#555555"/>
  <text x="90" y="145" font-family="Inter, sans-serif" font-size="9.5" font-weight="600" fill="#555555" letter-spacing="1">FULL-STACK ENGINEER &amp; DESIGNER</text>

