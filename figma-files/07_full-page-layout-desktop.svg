  <text x="64" y="210" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#111111" letter-spacing="-2.5">Where Design</text>
  <text x="64" y="270" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#111111" letter-spacing="-2.5">Meets </text>
