  <path d="M 1252 258 C 1180 330, 1100 400, 1010 480" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="5 5" fill="none"/>
  <path d="M 712 480 C 800 472, 900 476, 1010 480" stroke="#888888" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="5 5" fill="none"/>
  <path d="M 1308 480 C 1220 472, 1120 476, 1010 480" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="5 5" fill="none"/>
  <path d="M 768 702 C 840 630, 920 560, 1010 480" stroke="#6366f1" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="5 5" fill="none"/>
  <path d="M 1252 702 C 1180 630, 1100 560, 1010 480" stroke="#888888" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="5 5" fill="none"/>

