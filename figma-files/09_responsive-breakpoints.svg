<svg width="900" height="320" viewBox="0 0 900 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Responsive Breakpoints Reference</title>

  <rect width="900" height="320" fill="#F8F8F8" rx="16"/>
  <rect x="0" y="0" width="220" height="18" fill="#111111"/>
  <text x="8" y="12" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ffffff" letter-spacing="0.08em">RESPONSIVE BREAKPOINTS</text>

  <!-- ── Desktop 1440 ── -->
  <g transform="translate(32, 36)">
    <rect width="200" height="130" rx="8" fill="white" stroke="#000000" stroke-opacity="0.1" stroke-width="1"/>
    <!-- Screen notch -->
    <rect x="80" y="0" width="40" height="4" rx="2" fill="#CCCCCC"/>
    <!-- Content sketch -->
    <rect x="8" y="12" width="184" height="8" rx="2" fill="#E0E0E0"/>
    <rect x="8" y="26" width="80" height="80" rx="4" fill="#F0F0F0"/>
    <rect x="96" y="26" width="96" height="80" rx="4" fill="#E8E8E8"/>
    <!-- 2-col indicator -->
    <line x1="92" y1="26" x2="92" y2="106" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="2 2"/>
    <rect x="8" y="112" width="184" height="10" rx="2" fill="#F0F0F0"/>
    <text x="100" y="148" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#111111" text-anchor="middle">Desktop</text>
    <text x="100" y="162" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">≥ 1024px</text>
    <text x="100" y="174" font-family="Inter, sans-serif" font-size="8" fill="#555555" text-anchor="middle">2-column grid · 64px padding</text>
    <text x="100" y="184" font-family="Inter, sans-serif" font-size="8" fill="#555555" text-anchor="middle">SystemCore: 580px</text>
  </g>

  <!-- ── Tablet 768 ── -->
  <g transform="translate(260, 36)">
    <rect width="160" height="130" rx="8" fill="white" stroke="#000000" stroke-opacity="0.1" stroke-width="1"/>
    <rect x="60" y="0" width="40" height="4" rx="2" fill="#CCCCCC"/>
    <!-- 1-col stacked -->
    <rect x="8" y="12" width="144" height="8" rx="2" fill="#E0E0E0"/>
    <rect x="8" y="26" width="144" height="44" rx="4" fill="#F0F0F0"/>
    <rect x="8" y="76" width="144" height="44" rx="4" fill="#E8E8E8"/>
    <text x="80" y="148" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#111111" text-anchor="middle">Tablet</text>
    <text x="80" y="162" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">768px – 1024px</text>
    <text x="80" y="174" font-family="Inter, sans-serif" font-size="8" fill="#555555" text-anchor="middle">1-column stacked · 32px pad</text>
    <text x="80" y="184" font-family="Inter, sans-serif" font-size="8" fill="#555555" text-anchor="middle">SystemCore: 460px</text>
  </g>

  <!-- ── Mobile L 640 ── -->
  <g transform="translate(452, 36)">
    <rect width="120" height="130" rx="8" fill="white" stroke="#000000" stroke-opacity="0.1" stroke-width="1"/>
    <rect x="40" y="0" width="40" height="4" rx="2" fill="#CCCCCC"/>
    <rect x="8" y="12" width="104" height="8" rx="2" fill="#E0E0E0"/>
    <rect x="8" y="26" width="104" height="36" rx="4" fill="#F0F0F0"/>
    <rect x="8" y="68" width="104" height="52" rx="4" fill="#E8E8E8"/>
    <text x="60" y="148" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#111111" text-anchor="middle">Mobile L</text>
    <text x="60" y="162" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">480px – 768px</text>
    <text x="60" y="174" font-family="Inter, sans-serif" font-size="8" fill="#555555" text-anchor="middle">1-col · 20px pad</text>
    <text x="60" y="184" font-family="Inter, sans-serif" font-size="8" fill="#555555" text-anchor="middle">SystemCore: 360px</text>
  </g>

  <!-- ── Mobile S 390 ── -->
  <g transform="translate(604, 36)">
    <rect width="90" height="130" rx="8" fill="white" stroke="#000000" stroke-opacity="0.1" stroke-width="1"/>
    <rect x="25" y="0" width="40" height="4" rx="2" fill="#CCCCCC"/>
    <rect x="6" y="12" width="78" height="8" rx="2" fill="#E0E0E0"/>
    <rect x="6" y="26" width="78" height="30" rx="4" fill="#F0F0F0"/>
    <rect x="6" y="62" width="78" height="58" rx="4" fill="#E8E8E8"/>
    <text x="45" y="148" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#111111" text-anchor="middle">Mobile S</text>
    <text x="45" y="162" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">≤ 420px</text>
    <text x="45" y="174" font-family="Inter, sans-serif" font-size="8" fill="#555555" text-anchor="middle">1-col · 20px pad</text>
    <text x="45" y="184" font-family="Inter, sans-serif" font-size="8" fill="#555555" text-anchor="middle">SystemCore: 300px</text>
  </g>

  <!-- Breakpoint ruler -->
  <g transform="translate(32, 220)">
    <line x1="0" y1="20" x2="836" y2="20" stroke="#000000" stroke-opacity="0.15" stroke-width="1"/>
    <!-- Markers -->
    <line x1="0"   y1="14" x2="0"   y2="26" stroke="#111111" stroke-width="1.5"/>
    <text x="0"   y="38" font-family="Inter, sans-serif" font-size="9" fill="#111111" text-anchor="middle">320</text>
    <line x1="116" y1="14" x2="116" y2="26" stroke="#6366f1" stroke-width="1.5"/>
    <text x="116" y="38" font-family="Inter, sans-serif" font-size="9" fill="#6366f1" text-anchor="middle">420</text>
    <line x1="232" y1="14" x2="232" y2="26" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="232" y="38" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">640</text>
    <line x1="418" y1="14" x2="418" y2="26" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="418" y="38" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">768</text>
    <line x1="580" y1="14" x2="580" y2="26" stroke="#22c55e" stroke-width="1.5"/>
    <text x="580" y="38" font-family="Inter, sans-serif" font-size="9" fill="#22c55e" text-anchor="middle">1024</text>
    <line x1="696" y1="14" x2="696" y2="26" stroke="#22c55e" stroke-width="1.5"/>
    <text x="696" y="38" font-family="Inter, sans-serif" font-size="9" fill="#22c55e" text-anchor="middle">1200</text>
    <line x1="836" y1="14" x2="836" y2="26" stroke="#111111" stroke-width="1.5"/>
    <text x="836" y="38" font-family="Inter, sans-serif" font-size="9" fill="#111111" text-anchor="middle">1440</text>

    <!-- Range labels -->
    <rect x="0" y="48" width="116" height="16" rx="4" fill="#6366f1" fill-opacity="0.12"/>
    <text x="58" y="60" font-family="Inter, sans-serif" font-size="8" fill="#6366f1" text-anchor="middle">xs ≤420</text>
    <rect x="124" y="48" width="108" height="16" rx="4" fill="#3b82f6" fill-opacity="0.12"/>
    <text x="178" y="60" font-family="Inter, sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle">sm 640</text>
    <rect x="240" y="48" width="178" height="16" rx="4" fill="#3b82f6" fill-opacity="0.1"/>
    <text x="329" y="60" font-family="Inter, sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle">md 768</text>
    <rect x="426" y="48" width="154" height="16" rx="4" fill="#22c55e" fill-opacity="0.12"/>
    <text x="503" y="60" font-family="Inter, sans-serif" font-size="8" fill="#22c55e" text-anchor="middle">lg 1024</text>
    <rect x="588" y="48" width="108" height="16" rx="4" fill="#22c55e" fill-opacity="0.1"/>
    <text x="642" y="60" font-family="Inter, sans-serif" font-size="8" fill="#22c55e" text-anchor="middle">xl 1200</text>
    <rect x="704" y="48" width="132" height="16" rx="4" fill="#111111" fill-opacity="0.06"/>
    <text x="770" y="60" font-family="Inter, sans-serif" font-size="8" fill="#111111" text-anchor="middle">2xl 1440</text>
  </g>
</svg>
