<svg width="800" height="560" viewBox="0 0 800 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Color &amp; Typography Design Tokens</title>

  <rect width="800" height="560" fill="#F8F8F8" rx="16"/>
  <rect x="0" y="0" width="220" height="18" fill="#111111"/>
  <text x="8" y="12" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ffffff" letter-spacing="0.08em">COLOR &amp; TYPOGRAPHY TOKENS</text>

  <!-- ── COLORS ── -->
  <text x="32" y="48" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#111111" letter-spacing="0.06em">COLORS</text>

  <!-- Background -->
  <rect x="32" y="58" width="60" height="60" rx="10" fill="#F0F0F0" stroke="#CCCCCC" stroke-width="1"/>
  <text x="32" y="132" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#555555">--bg</text>
  <text x="32" y="143" font-family="Inter, sans-serif" font-size="8" fill="#999999">#F0F0F0</text>

  <!-- BG Card -->
  <rect x="108" y="58" width="60" height="60" rx="10" fill="rgba(255,255,255,0.9)" stroke="#CCCCCC" stroke-width="1"/>
  <text x="108" y="132" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#555555">--bg-card</text>
  <text x="108" y="143" font-family="Inter, sans-serif" font-size="8" fill="#999999">white 90%</text>

  <!-- Text Primary -->
  <rect x="184" y="58" width="60" height="60" rx="10" fill="#111111"/>
  <text x="184" y="132" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#555555">--text-primary</text>
  <text x="184" y="143" font-family="Inter, sans-serif" font-size="8" fill="#999999">#111111</text>

  <!-- Text Secondary -->
  <rect x="260" y="58" width="60" height="60" rx="10" fill="#555555"/>
  <text x="260" y="132" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#555555">--text-secondary</text>
  <text x="260" y="143" font-family="Inter, sans-serif" font-size="8" fill="#999999">#555555</text>

  <!-- Text Muted -->
  <rect x="336" y="58" width="60" height="60" rx="10" fill="#999999"/>
  <text x="336" y="132" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#555555">--text-muted</text>
  <text x="336" y="143" font-family="Inter, sans-serif" font-size="8" fill="#999999">#999999</text>

  <!-- Accent -->
  <rect x="412" y="58" width="60" height="60" rx="10" fill="#3b82f6"/>
  <text x="412" y="132" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#555555">--accent</text>
  <text x="412" y="143" font-family="Inter, sans-serif" font-size="8" fill="#999999">#3b82f6</text>

  <!-- Accent Dim -->
  <rect x="488" y="58" width="60" height="60" rx="10" fill="#6366f1"/>
  <text x="488" y="132" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#555555">--accent-dim</text>
  <text x="488" y="143" font-family="Inter, sans-serif" font-size="8" fill="#999999">#6366f1</text>

  <!-- Green -->
  <rect x="564" y="58" width="60" height="60" rx="10" fill="#22c55e"/>
  <text x="564" y="132" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#555555">status green</text>
  <text x="564" y="143" font-family="Inter, sans-serif" font-size="8" fill="#999999">#22c55e</text>

  <!-- Border -->
  <rect x="640" y="58" width="60" height="60" rx="10" fill="white" stroke="#000000" stroke-opacity="0.08" stroke-width="4"/>
  <text x="640" y="132" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#555555">--border</text>
  <text x="640" y="143" font-family="Inter, sans-serif" font-size="8" fill="#999999">black 8%</text>

  <!-- ── TYPOGRAPHY ── -->
  <text x="32" y="180" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#111111" letter-spacing="0.06em">TYPOGRAPHY — Inter</text>

  <!-- Type scale rows -->
  <!-- Display -->
  <text x="32" y="224" font-family="Inter, sans-serif" font-size="40" font-weight="900" fill="#111111" letter-spacing="-1.8">Headline</text>
  <text x="500" y="210" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">clamp(2.6rem → 4rem)</text>
  <text x="500" y="222" font-family="Inter, sans-serif" font-size="9" fill="#555555">weight: 900 · tracking: -0.045em · lh: 1.1</text>

  <!-- Sub -->
  <text x="32" y="258" font-family="Inter, sans-serif" font-size="16" font-weight="400" fill="#555555">Subtext — I craft high-performance web apps...</text>
  <text x="500" y="252" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">1rem / 1.05rem</text>
  <text x="500" y="264" font-family="Inter, sans-serif" font-size="9" fill="#555555">weight: 400 · lh: 1.75</text>

  <!-- Badge -->
  <rect x="32" y="276" width="220" height="24" rx="12" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.1" stroke-width="1"/>
  <text x="44" y="292" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555" letter-spacing="1.2">BADGE LABEL TEXT</text>
  <text x="500" y="286" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">0.7rem</text>
  <text x="500" y="298" font-family="Inter, sans-serif" font-size="9" fill="#555555">weight: 600 · tracking: 0.1em · uppercase</text>

  <!-- Chip -->
  <rect x="32" y="316" width="64" height="22" rx="11" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.09" stroke-width="1"/>
  <text x="44" y="331" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555">React</text>
  <text x="500" y="326" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">0.72rem chip</text>
  <text x="500" y="338" font-family="Inter, sans-serif" font-size="9" fill="#555555">weight: 600 · tracking: 0.02em</text>

  <!-- Stat value -->
  <text x="32" y="380" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#111111" letter-spacing="-1.2">20+</text>
  <text x="32" y="398" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#999999">Projects Shipped</text>
  <text x="500" y="372" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">1.6rem stat value</text>
  <text x="500" y="384" font-family="Inter, sans-serif" font-size="9" fill="#555555">weight: 800 · tracking: -0.04em</text>
  <text x="500" y="396" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">0.72rem stat label</text>
  <text x="500" y="408" font-family="Inter, sans-serif" font-size="9" fill="#555555">weight: 500 · tracking: 0.02em</text>

  <!-- Card title -->
  <text x="32" y="440" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#111111" letter-spacing="-0.2">Card Title Text</text>
  <text x="32" y="456" font-family="Inter, sans-serif" font-size="11" fill="#999999">Card sub text</text>
  <text x="500" y="436" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">0.78rem title / 0.66rem sub</text>
  <text x="500" y="448" font-family="Inter, sans-serif" font-size="9" fill="#555555">title: 700 · sub: 400</text>

  <!-- Nav link -->
  <text x="32" y="490" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#555555" letter-spacing="0.1">Nav Link</text>
  <text x="500" y="486" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">0.85rem</text>
  <text x="500" y="498" font-family="Inter, sans-serif" font-size="9" fill="#555555">weight: 500 · tracking: 0.01em</text>

  <!-- Core label -->
  <rect x="32" y="506" width="60" height="18" rx="9" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.1" stroke-width="1"/>
  <text x="62" y="519" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#555555" text-anchor="middle" letter-spacing="2">KUNAL</text>
  <text x="500" y="514" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">0.58rem core label</text>
  <text x="500" y="526" font-family="Inter, sans-serif" font-size="9" fill="#555555">weight: 700 · tracking: 0.22em · uppercase</text>

  <!-- Dividers -->
  <line x1="32" y1="160" x2="768" y2="160" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="32" y1="420" x2="768" y2="420" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="32" y1="470" x2="768" y2="470" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
</svg>
