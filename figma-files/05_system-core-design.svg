<svg width="700" height="700" viewBox="0 0 700 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>System Core Visual Component Design</title>

  <!-- Background -->
  <rect width="700" height="700" fill="#F0F0F0" rx="20"/>

  <!-- Component label -->
  <rect x="0" y="0" width="180" height="18" fill="#111111"/>
  <text x="8" y="12" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ffffff" letter-spacing="0.08em">SYSTEM CORE VISUAL</text>

  <!-- Ambient glow 2 (outer) -->
  <circle cx="350" cy="350" r="148" fill="url(#glow2-grad)" opacity="0.5"/>
  <!-- Ambient glow 1 (inner) -->
  <circle cx="350" cy="350" r="115" fill="url(#glow1-grad)" opacity="0.7"/>

  <!-- Ring 3 (outermost, solid faint) -->
  <circle cx="350" cy="350" r="111" stroke="#000000" stroke-opacity="0.06" stroke-width="1" fill="none"/>
  <!-- Ring 2 (dashed blue) -->
  <circle cx="350" cy="350" r="96" stroke="#3b82f6" stroke-opacity="0.18" stroke-width="1" stroke-dasharray="5 4" fill="none"/>
  <!-- Ring 1 (solid dark) -->
  <circle cx="350" cy="350" r="80" stroke="#000000" stroke-opacity="0.12" stroke-width="1" fill="none"/>

  <!-- Profile circle -->
  <circle cx="350" cy="350" r="68" fill="white" opacity="0.96"/>
  <circle cx="350" cy="350" r="68" stroke="white" stroke-width="3" fill="none"/>
  <circle cx="350" cy="350" r="72" stroke="#000000" stroke-opacity="0.08" stroke-width="5" fill="none"/>
  <!-- Face placeholder -->
  <circle cx="350" cy="350" r="68" fill="#CCCCCC"/>
  <circle cx="350" cy="330" r="22" fill="#AAAAAA"/>
  <ellipse cx="350" cy="390" rx="36" ry="24" fill="#AAAAAA"/>
  <text x="350" y="354" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#666666" text-anchor="middle">Profile Photo</text>

  <!-- Core label pill -->
  <rect x="316" y="424" width="68" height="20" rx="10" fill="#000000" fill-opacity="0.05" stroke="#000000" stroke-opacity="0.1" stroke-width="1"/>
  <text x="350" y="438" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#555555" text-anchor="middle" letter-spacing="2">KUNAL</text>

  <!-- Connection lines (6 paths to cards) -->
  <!-- TL -->
  <path d="M 108 128 C 165 185, 228 248, 350 350" stroke="url(#line-tl)" stroke-width="1.2" fill="none" stroke-dasharray="5 5"/>
  <!-- TR -->
  <path d="M 592 128 C 535 185, 472 248, 350 350" stroke="url(#line-tr)" stroke-width="1.2" fill="none" stroke-dasharray="5 5"/>
  <!-- L -->
  <path d="M 52 350 C 130 342, 212 346, 350 350" stroke="url(#line-l)" stroke-width="1.2" fill="none" stroke-dasharray="5 5"/>
  <!-- R -->
  <path d="M 648 350 C 570 342, 488 346, 350 350" stroke="url(#line-r)" stroke-width="1.2" fill="none" stroke-dasharray="5 5"/>
  <!-- BL -->
  <path d="M 108 572 C 165 515, 228 452, 350 350" stroke="url(#line-bl)" stroke-width="1.2" fill="none" stroke-dasharray="5 5"/>
  <!-- BR -->
  <path d="M 592 572 C 535 515, 472 452, 350 350" stroke="url(#line-br)" stroke-width="1.2" fill="none" stroke-dasharray="5 5"/>

  <!-- Particle dots on lines -->
  <circle cx="200" cy="220" r="3" fill="#666666" opacity="0.7"/>
  <circle cx="480" cy="220" r="3" fill="#3b82f6" opacity="0.7"/>
  <circle cx="160" cy="348" r="3" fill="#888888" opacity="0.7"/>
  <circle cx="540" cy="348" r="3" fill="#3b82f6" opacity="0.7"/>
  <circle cx="200" cy="480" r="3" fill="#6366f1" opacity="0.7"/>
  <circle cx="480" cy="480" r="3" fill="#555555" opacity="0.7"/>

  <!-- Skill card placeholders -->
  <!-- TL card -->
  <rect x="20" y="96" width="170" height="60" rx="12" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="32" y="108" width="30" height="30" rx="8" fill="#000000" fill-opacity="0.08"/>
  <text x="70" y="122" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#111111">Frontend Eng.</text>
  <text x="70" y="136" font-family="Inter, sans-serif" font-size="9" fill="#999999">React · Next.js</text>

  <!-- TR card -->
  <rect x="510" y="96" width="170" height="60" rx="12" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="522" y="108" width="30" height="30" rx="8" fill="rgba(100,100,100,0.08)"/>
  <text x="560" y="122" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#111111">UI/UX Design</text>
  <text x="560" y="136" font-family="Inter, sans-serif" font-size="9" fill="#999999">Figma · Systems</text>

  <!-- L card -->
  <rect x="20" y="320" width="170" height="60" rx="12" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="32" y="332" width="30" height="30" rx="8" fill="rgba(71,85,105,0.09)"/>
  <text x="70" y="346" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#111111">Backend Systems</text>
  <text x="70" y="360" font-family="Inter, sans-serif" font-size="9" fill="#999999">Node.js · APIs</text>

  <!-- R card -->
  <rect x="510" y="320" width="170" height="60" rx="12" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="522" y="332" width="30" height="30" rx="8" fill="rgba(59,130,246,0.1)"/>
  <text x="560" y="346" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#111111">AI Integration</text>
  <text x="560" y="360" font-family="Inter, sans-serif" font-size="9" fill="#999999">LLMs · Agents</text>

  <!-- BL card -->
  <rect x="20" y="544" width="170" height="60" rx="12" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="32" y="556" width="30" height="30" rx="8" fill="rgba(100,100,100,0.08)"/>
  <text x="70" y="570" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#111111">Performance</text>
  <text x="70" y="584" font-family="Inter, sans-serif" font-size="9" fill="#999999">Core Web Vitals</text>

  <!-- BR card -->
  <rect x="510" y="544" width="170" height="60" rx="12" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
  <rect x="522" y="556" width="30" height="30" rx="8" fill="rgba(99,102,241,0.09)"/>
  <text x="560" y="570" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#111111">Sys. Architecture</text>
  <text x="560" y="584" font-family="Inter, sans-serif" font-size="9" fill="#999999">Cloud · DevOps</text>

  <!-- Annotation: ring sizes -->
  <line x1="350" y1="350" x2="430" y2="350" stroke="#f59e0b" stroke-width="0.6"/>
  <text x="356" y="346" font-family="Inter, sans-serif" font-size="8" fill="#f59e0b">r=80 ring1</text>
  <line x1="350" y1="350" x2="446" y2="350" stroke="#3b82f6" stroke-width="0.6" stroke-dasharray="2 2"/>
  <text x="356" y="358" font-family="Inter, sans-serif" font-size="8" fill="#3b82f6">r=96 ring2</text>
  <line x1="350" y1="350" x2="461" y2="350" stroke="#6366f1" stroke-width="0.6"/>
  <text x="356" y="366" font-family="Inter, sans-serif" font-size="8" fill="#6366f1">r=111 ring3</text>

  <defs>
    <radialGradient id="glow1-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8C8C8" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#969696" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="line-tl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#888" stop-opacity="0"/>
      <stop offset="100%" stop-color="#444" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="line-tr" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#888" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="line-l" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#aaa" stop-opacity="0"/>
      <stop offset="100%" stop-color="#555" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="line-r" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#aaa" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="line-bl" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#888" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="line-br" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#888" stop-opacity="0"/>
      <stop offset="100%" stop-color="#444" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
</svg>
