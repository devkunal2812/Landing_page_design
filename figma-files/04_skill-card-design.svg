<svg width="800" height="480" viewBox="0 0 800 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Skill Card Component — All Variants</title>

  <rect width="800" height="480" fill="#E8E8E8" rx="16"/>

  <!-- Section label -->
  <rect x="0" y="0" width="200" height="18" fill="#111111"/>
  <text x="8" y="12" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ffffff" letter-spacing="0.08em">SKILL CARD — ALL VARIANTS</text>

  <!-- ── Card 1: Frontend Engineering (iconDark) ── -->
  <g transform="translate(32, 40)">
    <rect width="210" height="68" rx="14" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
    <rect x="12" y="16" width="36" height="36" rx="9" fill="#000000" fill-opacity="0.08" stroke="#000000" stroke-opacity="0.12" stroke-width="1"/>
    <!-- Code icon -->
    <polyline points="26,28 20,34 26,40" stroke="#111111" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <polyline points="34,28 40,34 34,40" stroke="#111111" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <text x="58" y="31" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#111111">Frontend Engineering</text>
    <text x="58" y="46" font-family="Inter, sans-serif" font-size="10" fill="#999999">React · Next.js · TypeScript</text>
    <!-- Variant label -->
    <text x="0" y="82" font-family="Inter, sans-serif" font-size="9" fill="#555555">iconDark · cardTl</text>
  </g>

  <!-- ── Card 2: UI/UX Design (iconMid) ── -->
  <g transform="translate(260, 40)">
    <rect width="210" height="68" rx="14" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
    <rect x="12" y="16" width="36" height="36" rx="9" fill="rgba(100,100,100,0.08)" stroke="rgba(100,100,100,0.14)" stroke-width="1"/>
    <!-- Sun icon -->
    <circle cx="30" cy="34" r="5" stroke="#555555" stroke-width="1.8" fill="none"/>
    <line x1="30" y1="24" x2="30" y2="27" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="30" y1="41" x2="30" y2="44" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="34" x2="23" y2="34" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="37" y1="34" x2="40" y2="34" stroke="#555555" stroke-width="1.5" stroke-linecap="round"/>
    <text x="58" y="31" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#111111">UI/UX Design</text>
    <text x="58" y="46" font-family="Inter, sans-serif" font-size="10" fill="#999999">Figma · Design Systems</text>
    <text x="0" y="82" font-family="Inter, sans-serif" font-size="9" fill="#555555">iconMid · cardTr</text>
  </g>

  <!-- ── Card 3: Backend Systems (iconSlate) ── -->
  <g transform="translate(488, 40)">
    <rect width="210" height="68" rx="14" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
    <rect x="12" y="16" width="36" height="36" rx="9" fill="rgba(71,85,105,0.09)" stroke="rgba(71,85,105,0.15)" stroke-width="1"/>
    <!-- DB icon -->
    <ellipse cx="30" cy="26" rx="10" ry="4" stroke="#475569" stroke-width="1.8" fill="none"/>
    <path d="M20 26 Q20 34 30 34 Q40 34 40 26" stroke="#475569" stroke-width="1.8" fill="none"/>
    <path d="M20 30 Q20 38 30 38 Q40 38 40 30" stroke="#475569" stroke-width="1.8" fill="none"/>
    <text x="58" y="31" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#111111">Backend Systems</text>
    <text x="58" y="46" font-family="Inter, sans-serif" font-size="10" fill="#999999">Node.js · APIs · Databases</text>
    <text x="0" y="82" font-family="Inter, sans-serif" font-size="9" fill="#555555">iconSlate · cardL</text>
  </g>

  <!-- ── Card 4: AI Integration (iconAccent) ── -->
  <g transform="translate(32, 160)">
    <rect width="210" height="68" rx="14" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
    <rect x="12" y="16" width="36" height="36" rx="9" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.18)" stroke-width="1"/>
    <!-- Bulb icon -->
    <path d="M30 22 a8 8 0 0 1 5 14 l-1 2 H26 l-1-2 a8 8 0 0 1 5-14z" stroke="#3b82f6" stroke-width="1.8" fill="none"/>
    <line x1="27" y1="42" x2="33" y2="42" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <text x="58" y="31" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#111111">AI Integration</text>
    <text x="58" y="46" font-family="Inter, sans-serif" font-size="10" fill="#999999">LLMs · Agents · RAG</text>
    <text x="0" y="82" font-family="Inter, sans-serif" font-size="9" fill="#555555">iconAccent · cardR</text>
  </g>

  <!-- ── Card 5: Performance (iconMid) ── -->
  <g transform="translate(260, 160)">
    <rect width="210" height="68" rx="14" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
    <rect x="12" y="16" width="36" height="36" rx="9" fill="rgba(100,100,100,0.08)" stroke="rgba(100,100,100,0.14)" stroke-width="1"/>
    <!-- Pulse icon -->
    <polyline points="20,34 24,34 27,24 33,44 36,34 40,34" stroke="#555555" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="58" y="31" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#111111">Performance Opt.</text>
    <text x="58" y="46" font-family="Inter, sans-serif" font-size="10" fill="#999999">Core Web Vitals · Profiling</text>
    <text x="0" y="82" font-family="Inter, sans-serif" font-size="9" fill="#555555">iconMid · cardBl</text>
  </g>

  <!-- ── Card 6: Systems Architecture (iconIndigo) ── -->
  <g transform="translate(488, 160)">
    <rect width="210" height="68" rx="14" fill="white" fill-opacity="0.9" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
    <rect x="12" y="16" width="36" height="36" rx="9" fill="rgba(99,102,241,0.09)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
    <!-- Monitor icon -->
    <rect x="20" y="22" width="20" height="14" rx="2" stroke="#6366f1" stroke-width="1.8" fill="none"/>
    <line x1="26" y1="40" x2="34" y2="40" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="30" y1="36" x2="30" y2="40" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    <text x="58" y="31" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#111111">Systems Architecture</text>
    <text x="58" y="46" font-family="Inter, sans-serif" font-size="10" fill="#999999">Cloud · DevOps · Scalability</text>
    <text x="0" y="82" font-family="Inter, sans-serif" font-size="9" fill="#555555">iconIndigo · cardBr</text>
  </g>

  <!-- ── Hover state card ── -->
  <g transform="translate(32, 290)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#3b82f6">HOVER STATE</text>
    <rect y="8" width="210" height="68" rx="14" fill="white" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1"/>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.13"/>
    </filter>
    <rect y="8" width="210" height="68" rx="14" fill="white" filter="url(#card-shadow)" opacity="0.6"/>
    <rect x="12" y="24" width="36" height="36" rx="9" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.18)" stroke-width="1"/>
    <text x="58" y="47" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#111111">AI Integration</text>
    <text x="58" y="62" font-family="Inter, sans-serif" font-size="10" fill="#999999">LLMs · Agents · RAG</text>
    <!-- Lift arrow -->
    <line x1="230" y1="42" x2="230" y2="8" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 2"/>
    <polygon points="226,12 230,4 234,12" fill="#3b82f6"/>
    <text x="236" y="28" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">-6px lift</text>
    <text x="236" y="40" font-family="Inter, sans-serif" font-size="9" fill="#3b82f6">scale(1.04)</text>
  </g>

  <!-- ── Anatomy callouts ── -->
  <g transform="translate(260, 290)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#555555">ANATOMY</text>
    <rect y="8" width="210" height="68" rx="14" fill="white" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
    <!-- Icon box callout -->
    <rect x="12" y="24" width="36" height="36" rx="9" fill="rgba(0,0,0,0.05)" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="12" y="20" font-family="Inter, sans-serif" font-size="8" fill="#f59e0b">36×36 icon</text>
    <!-- Title callout -->
    <text x="58" y="47" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#111111">Card Title</text>
    <line x1="58" y1="49" x2="180" y2="49" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="2 2"/>
    <text x="182" y="52" font-family="Inter, sans-serif" font-size="8" fill="#3b82f6">700 12px</text>
    <!-- Sub callout -->
    <text x="58" y="62" font-family="Inter, sans-serif" font-size="10" fill="#999999">Sub text</text>
    <line x1="58" y1="64" x2="180" y2="64" stroke="#6366f1" stroke-width="0.5" stroke-dasharray="2 2"/>
    <text x="182" y="67" font-family="Inter, sans-serif" font-size="8" fill="#6366f1">400 10px</text>
    <!-- Padding callout -->
    <rect y="8" width="210" height="68" rx="14" fill="none" stroke="#22c55e" stroke-width="0.5" stroke-dasharray="3 2"/>
    <text x="2" y="90" font-family="Inter, sans-serif" font-size="8" fill="#22c55e">padding: 12px 15px · gap: 10px · border-radius: 14px</text>
  </g>
</svg>
